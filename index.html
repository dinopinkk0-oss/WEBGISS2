<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WebGIS Informasi Pemukiman Sorosutan. Kota Yogyakarta</title>

<link href="https://api.mapbox.com/mapbox-gl-js/v3.20.0/mapbox-gl.css" rel="stylesheet" />
<script src="https://api.mapbox.com/mapbox-gl-js/v3.20.0/mapbox-gl.js"></script>

<style>
body { margin:0; }
#map { width:100%; height:100vh; }

/* popup */
.mapboxgl-popup-content {
    border-radius:10px;
    font-family: Arial;
}
</style>
</head>

<body>

<div id="map"></div>

<script>

// ================= TOKEN =================
mapboxgl.accessToken = 'pk.eyJ1IjoiZGhybjIxIiwiYSI6ImNtbm9meDNxcTI0Y2sycXEyaG43dnJqajIifQ.p1s6U3VJQR6jJu0kSN2WLQ';

// ================= MAP =================
const map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/streets-v12',
    center: [110.372, -7.815], // Sorosutan
    zoom: 16
});

// ================= CONTROL =================
map.addControl(new mapboxgl.NavigationControl());

// ================= LOAD DATA =================
map.on('load', () => {

    map.addSource('bangunan', {
        type: 'geojson',
        data: 'BangunanRumah2.geojson'
    });

    // ================= LAYER =================
    map.addLayer({
        id: 'bangunan-fill',
        type: 'fill',
        source: 'bangunan',
        paint: {
            'fill-color': [
                'match',
                ['get', 'jenis'],
                'Permukiman', '#22c55e',
                'Fasilitas', '#3b82f6',
                '#9ca3af'
            ],
            'fill-opacity': 0.6
        }
    });

    map.addLayer({
        id: 'bangunan-outline',
        type: 'line',
        source: 'bangunan',
        paint: {
            'line-color': '#000',
            'line-width': 1
        }
    });

    // ================= POPUP =================
    map.on('click', 'bangunan-fill', (e) => {

        const props = e.features[0].properties;

        const html = `
            <b>${props.nama}</b><br>
            Jenis: ${props.jenis}<br>
            Luas: ${props.luas} m²
        `;

        new mapboxgl.Popup()
            .setLngLat(e.lngLat)
            .setHTML(html)
            .addTo(map);
    });

    map.on('mouseenter', 'bangunan-fill', () => {
        map.getCanvas().style.cursor = 'pointer';
    });

    map.on('mouseleave', 'bangunan-fill', () => {
        map.getCanvas().style.cursor = '';
    });

});

</script>

</body>
</html>
