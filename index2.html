<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WebGIS Area Sekitar Rumah Ilma</title>

<!-- LEAFLET CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: 'Poppins', sans-serif; background: #f5f5f5; }

.header {
    background: linear-gradient(135deg, #146855 0%, #1a8a6e 50%, #0d5242 100%);
    padding: 32px 40px;
    text-align: center;
    color: white;
    position: relative;
    overflow: hidden;
}
.header::before {
    content: '';
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 60%);
}
.header h1 {
    font-size: 1.8rem;
    font-weight: 700;
    margin-bottom: 6px;
    position: relative;
}
.header p {
    font-size: 0.95rem;
    opacity: 0.85;
    position: relative;
}

#map-container {
    position: relative;
    width: 100%;
}

#map {
    width: 100%;
    height: 85vh;
}

/* TOMBOL FLY */
#fly {
    position: absolute;
    top: 14px;
    left: 60px;
    background: #e91e63;
    color: white;
    border: none;
    padding: 9px 16px;
    border-radius: 6px;
    z-index: 1000;
    cursor: pointer;
    font-family: 'Poppins', sans-serif;
    font-size: 13px;
    font-weight: 600;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    transition: background 0.2s, transform 0.1s;
}
#fly:hover { background: #c2185b; transform: scale(1.03); }
#fly:active { transform: scale(0.97); }

/* PANEL KONTROL LAYER */
#layer-control {
    position: absolute;
    top: 14px;
    right: 14px;
    background: white;
    border-radius: 10px;
    padding: 14px 16px;
    z-index: 1000;
    box-shadow: 0 3px 12px rgba(0,0,0,0.15);
    min-width: 170px;
}
#layer-control h4 {
    font-size: 12px;
    font-weight: 700;
    color: #333;
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1.5px solid #eee;
    padding-bottom: 6px;
}
.layer-item {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 7px;
    cursor: pointer;
    user-select: none;
}
.layer-item:last-child { margin-bottom: 0; }
.layer-item input[type="checkbox"] {
    accent-color: #146855;
    width: 14px;
    height: 14px;
    cursor: pointer;
}
.layer-swatch {
    width: 18px;
    height: 12px;
    border-radius: 2px;
    border: 1px solid rgba(0,0,0,0.2);
    flex-shrink: 0;
}
.layer-label {
    font-size: 12px;
    color: #444;
    font-weight: 500;
}

/* LEGENDA */
.legend {
    position: absolute;
    bottom: 28px;
    left: 12px;
    background: white;
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 12px;
    z-index: 1000;
    box-shadow: 0 3px 12px rgba(0,0,0,0.15);
    min-width: 140px;
}
.legend b {
    display: block;
    font-size: 12px;
    font-weight: 700;
    color: #333;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1.5px solid #eee;
    padding-bottom: 5px;
}
.legend-row {
    display: flex;
    align-items: center;
    gap: 7px;
    margin-bottom: 5px;
}
.legend-row:last-child { margin-bottom: 0; }
.legend-row span {
    display: inline-block;
    width: 18px;
    height: 11px;
    border-radius: 2px;
    border: 1px solid rgba(0,0,0,0.15);
    flex-shrink: 0;
}
.legend-row label { color: #444; font-size: 11.5px; }

/* INFO POPUP KUSTOM */
.custom-popup .leaflet-popup-content-wrapper {
    border-radius: 10px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    padding: 0;
}
.custom-popup .leaflet-popup-content {
    margin: 12px 16px;
    font-family: 'Poppins', sans-serif;
}

/* KOORDINAT BAWAH */
#coords {
    position: absolute;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255,255,255,0.92);
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 11px;
    color: #555;
    z-index: 1000;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    pointer-events: none;
}
</style>

    <!-- KOORDINAT -->

// INISIALISASI MAP
var map = L.map('map', {
    center: [-7.8220, 110.3746],
    zoom: 16,
    zoomControl: true
});

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
    maxZoom: 20
}).addTo(map);

var styleConfig = {
    "Rumah Ilma":    { fillColor: '#e91e63', color: '#880e4f', fillOpacity: 0.85, weight: 2 },
    "Masjid":        { fillColor: '#1e3d59', color: '#0a1f2e', fillOpacity: 0.75, weight: 1.5 },
    "Permukiman":    { fillColor: '#ff6e40', color: '#cc4a20', fillOpacity: 0.70, weight: 1 },
    "Bangunan Lain": { fillColor: '#ffc13b', color: '#cc8800', fillOpacity: 0.70, weight: 1 },
    "Lahan Terbuka": { fillColor: '#4caf50', color: '#2e7d32', fillOpacity: 0.65, weight: 1 }
};

var badgeColor = {
    "Rumah Ilma":    { bg: '#fce4ec', color: '#880e4f' },
    "Masjid":        { bg: '#e3f2fd', color: '#0d2b42' },
    "Permukiman":    { bg: '#fbe9e7', color: '#bf360c' },
    "Bangunan Lain": { bg: '#fff8e1', color: '#8d5500' },
    "Lahan Terbuka": { bg: '#e8f5e9', color: '#1b5e20' }
};

function getStyle(kategori) {
    return styleConfig[kategori] || { fillColor: '#888', color: '#333', fillOpacity: 0.6, weight: 1 };
}

var layers = {};

function addLayer(data, kategori) {
    var layer = L.geoJSON(data, {
        style: function() { return getStyle(kategori); },
        onEachFeature: function(feature, lyr) {
            var props = feature.properties;
            var nama = props.nama || kategori;
            var bc = badgeColor[kategori] || { bg: '#eee', color: '#333' };
            var popup = '<div style="font-family:Poppins,sans-serif;min-width:130px;">'
                + '<div style="font-weight:700;font-size:14px;color:#222;margin-bottom:5px;">' + nama + '</div>'
                + '<span style="background:' + bc.bg + ';color:' + bc.color + ';font-size:11px;font-weight:600;padding:2px 9px;border-radius:12px;">' + kategori + '</span>'
                + '</div>';
            lyr.bindPopup(popup, { className: 'custom-popup', maxWidth: 220 });
            lyr.on('mouseover', function() { lyr.setStyle({ fillOpacity: 0.95, weight: 2.5 }); });
            lyr.on('mouseout', function() { lyr.setStyle(getStyle(kategori)); });
        }
    }).addTo(map);
    return layer;
}

layers['rumahilma']  = addLayer(dataRumahIlma, 'Rumah Ilma');
layers['masjid']     = addLayer(dataMasjid, 'Masjid');
layers['permukiman'] = addLayer(dataPermukiman, 'Permukiman');
layers['lain']       = addLayer(dataBangunanLain, 'Bangunan Lain');
layers['lahan']      = addLayer(dataLahanTerbuka, 'Lahan Terbuka');

var cbMap = {
    'cb-rumahilma':  'rumahilma',
    'cb-masjid':     'masjid',
    'cb-permukiman': 'permukiman',
    'cb-lain':       'lain',
    'cb-lahan':      'lahan'
};
Object.keys(cbMap).forEach(function(cbId) {
    document.getElementById(cbId).addEventListener('change', function() {
        var layerKey = cbMap[cbId];
        if (this.checked) { map.addLayer(layers[layerKey]); }
        else { map.removeLayer(layers[layerKey]); }
    });
});

document.getElementById('fly').addEventListener('click', function() {
    map.setView([-7.822094, 110.375571], 19, { animate: true, duration: 1.2 });
    layers['rumahilma'].eachLayer(function(l) { l.openPopup(); });
});

map.on('mousemove', function(e) {
    document.getElementById('coords').innerHTML =
        'Lat: ' + e.latlng.lat.toFixed(6) + ' &nbsp;|&nbsp; Lng: ' + e.latlng.lng.toFixed(6);
});
map.on('mouseout', function() {
    document.getElementById('coords').innerHTML = 'Arahkan kursor ke peta';
});

</script>
